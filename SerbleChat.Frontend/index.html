<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Serble Chat</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Simple and flexible chat platform built on Serble infrastructure." />
    <meta name="theme-color" content="#3b82f6" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.svg" />
    <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96x96.svg" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.svg" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="384x384" href="/icons/icon-384x384.svg" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.svg" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Serble Chat" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        overflow: hidden;
        height: 100%;
      }
      /* Fixed positioning removes #root from the document flow entirely,
         so there is no scroll container and the browser can't scroll below
         the content even when the keyboard shrinks the visual viewport. */
      #root {
        position: fixed;
        top: var(--app-top, 0px);
        left: 0;
        width: 100%;
        height: var(--app-height, 100dvh);
        overflow: auto;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #313338;
        color: #e2e8f0;
      }
      /* Prevent iOS from zooming in on inputs (font-size must be ≥ 16px) */
      input, textarea, select {
        font-size: max(16px, 1em);
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #111213; }
      /* Hide scrollbar on elements that use overflow:auto for layout only */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
